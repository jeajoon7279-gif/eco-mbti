<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 환경보호 MBTI 찾기</title>
    <style>
        /* 웹 폰트(Pretendard) 로드 및 기본 디자인 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        
        * {
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            letter-spacing: -0.3px;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #f4f9f5 0%, #e8f3ec 100%);
            color: #2a3b31;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 메인 카드 컨테이너 */
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(42, 59, 49, 0.06), 0 1px 3px rgba(0, 0, 0, 0.02);
            max-width: 540px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* 화면 전환 효과 */
        .page { 
            display: none; 
            animation: fadeIn 0.4s ease-in-out;
        }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            color: #1e4620; 
            font-size: 26px; 
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 24px; 
            line-height: 1.4;
        }
        
        p { 
            font-size: 16px; 
            line-height: 1.7; 
            color: #5c6f62;
            margin-bottom: 35px; 
        }
        
        /* 둥근 진행률 바 */
        .progress-container {
            width: 100%;
            background-color: #e3ede6;
            border-radius: 100px;
            margin-bottom: 35px;
            height: 6px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #52b788 0%, #2d6a4f 100%);
            border-radius: 100px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 기본 버튼 스타일 (시작하기, 다시하기) */
        button {
            background-color: #2d6a4f;
            color: #ffffff;
            border: none;
            padding: 18px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.15);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        button:hover { 
            background-color: #1b4332; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 106, 79, 0.25);
        }

        button:active { transform: translateY(1px); }

        /* 질문 선택지 전용 소프트 버튼 스타일 */
        #question-page button {
            background-color: #f2f7f4;
            color: #2d6a4f;
            border: 1px solid #d8e8dd;
            box-shadow: none;
        }
        #question-page button:hover {
            background-color: #e8f3ec;
            color: #1b4332;
            border-color: #b7d7c2;
        }
        
        /* 결과창 스타일 */
        .result-title { 
            font-size: 30px; 
            font-weight: 800; 
            color: #1b4332; 
            margin: 25px 0; 
            word-break: keep-all;
        }
        
        .result-desc { 
            background-color: #f4f9f5; 
            padding: 26px; 
            border-radius: 18px; 
            text-align: left; 
            line-height: 1.8;
            font-size: 15.5px;
            color: #405346;
            border-left: 4px solid #52b788;
        }

        #result-page button { margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-page" class="page active">
        <h1>🌲 환경보호 MBTI 테스트 🌲</h1>
        <p>나는 지구 생태계에서 어떤 역할을 하고 있을까요?<br>나만의 독창적인 환경 성향을 알아보세요!</p>
        <button onclick="startTest()">테스트 시작하기</button>
    </div>

    <div id="question-page" class="page">
        <div class="progress-container"><div id="progress" class="progress-bar"></div></div>
        <h1 id="question-title">질문 내용</h1>
        <button id="ans-a" onclick="nextQuestion('A')">선택지 A</button>
        <button id="ans-b" onclick="nextQuestion('B')">선택지 B</button>
    </div>

    <div id="result-page" class="page">
        <h1>당신의 환경 성향은?</h1>
        <div id="result-name" class="result-title">로딩중...</div>
        <div id="result-explanation" class="result-desc">로딩중...</div>
        <br>
        <button onclick="location.reload()">다시 테스트하기</button>
    </div>
</div>

            { title: "플로깅(쓰레기 줍기 조깅)을 갈 때 내 선호 스타일은?", a: "크루에 가입해 십여 명의 사람들과 왁자지껄 힙하게 달리기", b: "이어폰으로 좋아하는 음악이나 자연 소리를 들으며 혼자 걷기", typeA: "A", typeB: "S" },
            { title: "환경에 관한 내 의견을 표출하는 방식은?", a: "토론회에서 발언을 하거나 댓글을 달며 소통하는 방식", b: "혼자 일기를 쓰거나 관련 서적을 읽으며 생각을 정리하는 방식", typeA: "A", typeB: "S" },
            { title: "친환경 리필샵에 방문했을 때 나는?", a: "사장님에게 이것저것 질문하고 다른 손님들과 가볍게 대화한다.", b: "필요한 알맹이만 조용히 용기에 담아 계산하고 빠르게 나온다.", typeA: "A", typeB: "S" },
            { title: "어떨 때 '함께 환경을 지키고 있다'는 유대감을 느끼나요?", a: "사람들과 다 함께 모여 챌린지 성공 인증샷을 찍을 때", b: "길거리에서 우연히 다른 사람이 나와 같은 텀블러를 쓴 걸 보았을 때", typeA: "A", typeB: "S" },
            { title: "내가 환경을 지키는 궁극적인 에너지는 어디서 나오나요?", a: "서로 격려하고 밀어주는 사람들과의 연대감และ 공동체 의식", b: "내면의 평화와 자연 본연의 고요함을 지키고 싶다는 개인적 신념", typeA: "A", typeB: "S" }
        ]
    };

    let questions = [];
    let currentIdx = 0;
    let scores = { M: 0, m: 0, L: 0, H: 0, R: 0, G: 0, A: 0, S: 0 };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startTest() {
        currentIdx = 0;
        scores = { M: 0, m: 0, L: 0, H: 0, R: 0, G: 0, A: 0, S: 0 };
        questions = [];

        // 축당 3개씩 총 12문항 무작위 추출
        const countPerGroup = 3; 
        const q1 = shuffle([...masterQuestions.M_m]).slice(0, countPerGroup);
        const q2 = shuffle([...masterQuestions.L_H]).slice(0, countPerGroup);
        const q3 = shuffle([...masterQuestions.R_G]).slice(0, countPerGroup);
        const q4 = shuffle([...masterQuestions.A_S]).slice(0, countPerGroup);

        questions = shuffle([...q1, ...q2, ...q3, ...q4]);

        showPage('question-page');
        updateQuestion();
    }

    function updateQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-title').innerText = q.title;
        document.getElementById('ans-a').innerText = q.a;
        document.getElementById('ans-b').innerText = q.b;

        const progressPercent = (currentIdx / questions.length) * 100;
        document.getElementById('progress').style.width = progressPercent + '%';
    }

    function nextQuestion(answer) {
        const q = questions[currentIdx];
        if (answer === 'A') { scores[q.typeA]++; } 
        else { scores[q.typeB]++; }

        currentIdx++;
        if (currentIdx < questions.length) {
            updateQuestion();
        } else {
            showResult();
        }
    }

    const results = {
        "MLRA": { name: "⚡ 벼락 (The Thunderbolt)", desc: "거대한 데이터와 기술을 무기로 기업과 정부를 강하게 타격하는 변혁가입니다." },
        "MLRS": { name: "💻 AI 가디언 (AI Guardian)", desc: "기후 시뮬레이션 데이터를 분석하며 보이지 않는 곳에서 최적의 정책을 짜는 전략가입니다." },
        "MLGA": { name: "⚙️ 설계자 (The Architect)", desc: "친환경 미래 인프라 세미나를 주도하며 거시적인 판을 짜는 지성인입니다." },
        "MLGS": { name: "🔬 연구원 (The Researcher)", desc: "실험실에서 탄소 포집이나 대체 플라스틱을 연구하며 조용히 지구를 구하는 브레인입니다." },
        "MHRA": { name: "🔥 들불 (The Wildfire)", desc: "기후 정의와 동물권을 위해 SNS와 광장을 뜨겁게 달구는 에너제틱 활동가입니다." },
        "MHRS": { name: "✍️ 깃털 (The Quill)", desc: "파괴되는 자연의 아픔을 아름다운 글로 써내 사람들의 심금을 울리는 기록자입니다." },
        "MHGA": { name: "🌊 해류 (The Ocean Current)", desc: "에코 팝업스토어나 페스티벌을 기획해 대중의 문화를 서서히 바꾸는 문화 기획자입니다." },
        "MHGS": { name: "☁️ 구름 (The Cloud)", desc: "기후 취약계층이나 환경 단체에 보이지 않는 곳에서 거액을 꾸준히 기부하는 키다리 아저씨입니다." },
        "mLRA": { name: "🔍 돋보기 (The Magnifier)", desc: "우리 동네 쓰레기 처리 시스템의 모순을 지적하고 주민 소통을 요구하는 철두철미 감시관입니다." },
        "mLRS": { name: "🧪 현미경 (The Microscope)", desc: "성분표와 탄소발자국을 철저히 분석해 진짜와 가짜 친환경(그린워싱)을 감별하는 판사입니다." },
        "mLGA": { name: "🔋 살림꾼 (The Eco-Saver)", desc: "커뮤니티에 고효율 가전 고르는 법, 완벽한 분리배출 팁을 앞장서 전파하는 동네 리더입니다." },
        "mLGS": { name: "🛠️ 맥가이버 (The Eco-Fixer)", desc: "물건이 고장 나면 버리지 않고 스스로 뚝딱 고쳐서 수명을 늘리는 진정한 실속파 장인입니다." },
        "mHRA": { name: "🌿 대나무 (The Bamboo)", desc: "친구들을 데리고 리필샵에 가거나 힙한 제로웨이스트 챌린지를 유행시키는 트렌드세터입니다." },
        "mHRS": { name: "🌱 새싹 (The Sprout)", desc: "내 몸과 지구에 무해하도록 완벽한 비건(채식)과 일회용품 제로를 홀로 묵묵히 실천하는 구도자입니다." },
        "mHGA": { name: "🐝 꿀벌 (The Honeybee)", desc: "주변 사람들에게 친환경 비누를 선물하고 일상에서 다정하게 에코 라이프를 권하는 전도사입니다." },
        "mHGS": { name: "🌳 이끼 (The Moss)", desc: "티 내지 않고 가방 속에 늘 텀블러와 손수건을 챙겨 다니며 세상을 소리 없이 푸르게 만드는 다정한 이웃입니다." }
    };

    function showResult() {
        showPage('result-page');
        let finalCode = "";
        finalCode += (scores.M >= scores.m) ? "M" : "m";
        finalCode += (scores.L >= scores.H) ? "L" : "h";
        finalCode += (scores.R >= scores.G) ? "R" : "G";
        finalCode += (scores.A >= scores.S) ? "A" : "S";

        let fixedCode = finalCode[0] + ((finalCode[1] === 'h') ? 'H' : 'L') + finalCode[2] + finalCode[3];
        const userResult = results[fixedCode];
        
        document.getElementById('result-name').innerText = userResult.name;
        document.getElementById('result-explanation').innerText = userResult.desc;
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }
</script>
